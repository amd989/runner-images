name: Build Ubuntu Slim Runner

on:
  push:
    branches:
      - main
    paths:
      - 'images/ubuntu-slim/**'
      - '.github/workflows/build-ubuntu-slim.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image for testing
        uses: docker/build-push-action@v6
        with:
          context: images/ubuntu-slim
          platforms: linux/amd64
          load: true
          tags: ubuntu-slim:test
          build-args: |
            IMAGE_VERSION=${{ github.run_number }}
            IMAGE_OWNER=amd989
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        working-directory: images/ubuntu-slim
        run: ./test.sh ubuntu-slim:test

      - name: Generate software report
        working-directory: images/ubuntu-slim
        run: ./generate-software-report.sh ubuntu-slim:test

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: software-report
          path: |
            images/ubuntu-slim/ubuntu-slim-Readme.md
            images/ubuntu-slim/ubuntu-slim-Report.json

  push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            amd989/github-runner
            ghcr.io/amd989/github-runner
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/ubuntu-slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ github.run_number }}
            IMAGE_OWNER=amd989
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build-and-test, push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download report artifacts
        uses: actions/download-artifact@v4
        with:
          name: software-report
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Ubuntu Slim Runner v${{ github.run_number }}" \
            --notes-file artifacts/images/ubuntu-slim/ubuntu-slim-Readme.md \
            artifacts/images/ubuntu-slim/ubuntu-slim-Readme.md \
            artifacts/images/ubuntu-slim/ubuntu-slim-Report.json

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: amd989/github-runner
          readme-filepath: artifacts/images/ubuntu-slim/ubuntu-slim-Readme.md
